services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transcendance_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
      - /app/node_modules
      - uploads-data:/app/static/uploads
    ports:
      - "5173:5173"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/transcendance_db"
    depends_on:
      - postgres

volumes:
  postgres-data:
