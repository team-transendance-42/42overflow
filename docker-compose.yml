services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transcendance_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-net

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/transcendance_db"
      VITE_API_PROXY_TARGET: "http://llm-server:8081"
    depends_on:
      - postgres
      - llm-server
    networks:
      - app-net

  llm-server:
    build:
      context: ./llm-system-interface
      dockerfile: Dockerfile
    expose:
      - "8081"
    env_file:
      - ./llm-system-interface/.env
    environment:
      OLLAMA_URL: "http://ollama:11434"
    depends_on:
      - ollama
    networks:
      - app-net

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - app-net
  
  # nginx:
  #   image: nginx:1.27-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     # optional for TLS:
  #     # - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
  #     - llm-server
  #   networks: app-net

volumes:
  postgres-data:
  ollama-data:

networks:
  app-net:
    driver: bridge
