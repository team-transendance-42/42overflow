services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transcendance_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-net

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    expose:
      - "5173"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/transcendance_db"
      VITE_API_PROXY_TARGET: "http://llm-server:8081"
    depends_on:
      postgres:
        condition: service_healthy
      llm-server:
        condition: service_healthy
      python-rag:
        condition: service_healthy
    networks:
      - app-net

  llm-server:
    build:
      context: ./llm-system-interface
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8081"
    env_file:
      - ./llm-system-interface/.env
    environment:
      RAG_BACKEND: "python"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      python-rag:
        condition: service_healthy
    networks:
      - app-net

  chromadb:
    image: chromadb/chroma:0.5.5
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  python-rag:
    build:
      context: ./python-services/rag
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8090"
    env_file:
      - ./llm-system-interface/.env
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s  # embedding 97 docs on CPU takes ~2min; 180s gives comfortable margin
    networks:
      - app-net

  python-stt:
    build:
      context: ./python-services/speach-to-text
    restart: unless-stopped
    command: ["uv", "run", "python", "main.py"]
    volumes:
      - whisper-model-cache:/root/.cache/whisper
    expose:
      - "8091"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8091/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-net

  ollama:
    image: ollama/ollama:0.20.5
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama-init:
    build:
      context: ./ollama-init
      dockerfile: Dockerfile
    env_file:
      - ./llm-system-interface/.env
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - app-net
    restart: "no"

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
      - llm-server
    networks:
      - app-net

volumes:
  postgres-data:
  ollama-data:
  chroma-data:
  uploads-data: # todo: for now not used, but might be needed for file uploads in RAG
  whisper-model-cache:

networks:
  app-net:
    driver: bridge